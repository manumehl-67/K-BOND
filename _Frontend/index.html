<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/K_BOND_icon.png" type="image/png">
  <title>K-BOND</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body id="header">

  <h1 id="hp_title">K-BOND</h1>
  <h2 id="registry_title" class="hidden">K-BOND</h2>
  <h2 id="hp_subtitle" class="subtitles">Bond with your fellow Kanti mates!</h2>

  <button id="login_button" class="buttons">log in</button>
  <button id="register_button1" class="buttons">register</button>

  <div class="container hidden" id="register_container">
    <h2 id="registry_subtitle" class="subtitles">Registration</h2>
    <input id="username_input" placeholder="Username">
    <input id="email_input" placeholder="E-Mail">
    <input id="password_input" placeholder="Password" type="password">
    <input id="surname_input" placeholder="Surname">
    <input id="name_input" placeholder="Name">
    <button id="register_button2" class="buttons">Send</button>
  </div>

  <div class="container hidden" id="login_container">
    <h2 id="login_subtitle" class="subtitles">Login</h2>
    <input id="login_username" placeholder="Username">
    <input id="login_password" placeholder="Password" type="password">
    <button id="login_button2" class="buttons">log in</button>
  </div>


  <!--Beziehungstatus auswählen
  <select name="relationship_status" id="relationship_status">
    <option value="single">single</option>
    <option value="dating">dating</option>
    <option value="in_a_relationship">in a relationship</option>
    <option value="complicated">complicated</option>

  </select>
-->
  <script src="script.js"></script>
</body>

</html>
