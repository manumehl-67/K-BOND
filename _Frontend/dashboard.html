<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/K_BOND_icon.png" type="image/png">
    <title>K-BOND Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="header" class="dashboard-layout">

    <h2 id="welcome_text"></h2>
    <div id="user_profile">
        <img id="display_profile_pic" src="assets/default-avatar.png" alt="Profile Picture">
        <div id="surname_name">surname name</div>
        <div id="profile_username">@username</div>
        <p id="my_stats">Follower: 0 | Gefolgt: 0</p>
        <button id="logout_button" class="buttons">Logout</button>
        <button id="edit_profile_button" class="buttons">Edit Profile</button>
        <div id="profile_information">
            <div>age: <span id="display_age"></span></div>
            <div>interests: <span id="display_interests"></span></div>
            <div>relationship status: <span id="display_relationship"></span></div>
        </div>
    </div>

    <div id="edit_container" class="hidden">
        <h3>Edit profile</h3>
        <div id="image_upload_section">
            <p>Change profile picture:</p>
            <input type="file" id="profile_pic_input" accept="image/*">
        </div>
        <input type="number" id="edit_age" placeholder="Age">
        <input type="text" id="edit_interests" placeholder="Personal interests (Hobbies, etc.)">

        <select id="edit_relationship">
            <option value="single">Single</option>
            <option value="dating">Dating</option>
            <option value="relationship">In a relationship</option>
            <option value="complicated">It's complicated</option>
        </select>

        <button id="save_profile_button" class="buttons">Save</button>
        <button id="cancel_edit_button" class="buttons">Cancel</button>
    
    </div>

    <div id="search_container">
        <h3>Find users</h3>
        <input type="text" id="search_input" placeholder="Search by username or name">
        <div id="search_results"></div> 
    </div>
    

    <div id="profile_modal" class="modal hidden">
    <div class="modal-content">
        <span id="close_modal" class="close">&times;</span>
        <div id="modal_user_info">
            <img id="modal_profile_pic" src="assets/default-avatar.png" alt="Profile Picture">
            <h2 id="modal_name">Name Surname</h2>
            <p id="modal_username">@username</p>
            <p id="modal_stats">Follower: 0 | Gefolgt: 0</p>
            <hr>
            <div class="profile-details">
                <p><strong>age:</strong> <span id="modal_age"></span></p>
                <p><strong>interests:</strong> <span id="modal_interests"></span></p>
                <p><strong>relationship:</strong> <span id="modal_relationship"></span></p>
            </div>
            <button id="modal_follow_btn" class="buttons">Folgen</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
